# Configuration file for pre-commit: https://pre-commit.com/
# To use pre-commit locally on your machine:
# - Install with `pip install pre-commit` once on your machine.
# - Run `pre-commit install` once in the root of this repository.
# - Run `pre-commit run --all-files` to check all files.

default_language_version:
  python: python3

repos:
  - repo: local
    hooks:
      - id: file-format
        name: file-format
        language: python
        entry: python .github/workflows/file_format.py
        types_or: [text]

      - id: check-markdown-links
        name: check-markdown-links
        language: python
        entry: python .github/workflows/check_markdown_links.py
        types: [markdown]

      - id: check-schema-refs
        name: check-schema-refs
        language: python
        entry: python .github/workflows/check_schema_refs.py
        types: [json]
